<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎄 Data Picks Your Drink 🍹</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background: linear-gradient(to bottom, #ffecd2, #fcb69f);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 600px;
  width: 100%;
  background: #fff;
  border-radius: 20px;
  padding: 2rem;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
}

.hidden { display: none; }

button {
  width: 100%;
  padding: 1rem;
  margin: .5rem 0;
  font-size: 1.1rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  color: #fff;
}

.btn1{background:#ff6f61;}
.btn2{background:#ffb347;}
.btn3{background:#6a5acd;}
.btn4{background:#20b2aa;}

.progress-bar {
  height: 25px;
  background: #eee;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1rem;
  position: relative;
}

.progress {
  height: 100%;
  background: #d94f4f;
  width: 0%;
}

.progress-text {
  position: absolute;
  top: -30px;
  width: 100%;
  font-weight: bold;
}

.emoji { font-size: 5rem; }
.result { font-size: 2rem; color:#d94f4f; font-weight:bold; }

.box {
  background:#fafafa;
  border-radius:12px;
  padding:10px;
  margin:10px 0;
}

.bar-row {
  display:flex;
  align-items:center;
}

.bar {
  flex:1;
  height:22px;
  background:#eee;
  border-radius:12px;
  overflow:hidden;
  margin:0 10px;
}

.fill { height:100%; }
.percent { width:55px; text-align:right; font-weight:bold; }

img.drink-small { width:50px; border-radius:8px; vertical-align:middle; margin-right:5px; }
img.drink-large { width:150px; border-radius:12px; margin-bottom:10px; }

/* 📱 Mobile optimization */
@media (max-width: 600px) {
  .container {
    padding: 1.2rem;
    border-radius: 16px;
  }

  h1 { font-size: 1.5rem; }
  h2 { font-size: 1.2rem; }

  button {
    font-size: 1rem;
    padding: 0.9rem;
  }

  .emoji {
    font-size: 3.5rem;
  }

  .result {
    font-size: 1.5rem;
  }

  img.drink-large {
    width: 120px;
  }

  img.drink-small {
    width: 40px;
  }

  .progress-text {
    font-size: 0.9rem;
    top: -25px;
  }
}
</style>
</head>

<body>
<div class="container">

<!-- Welcome -->
<div id="welcome">
  <h1>🎄 Data Picks Your Drink 🍹</h1>
  <button style="background:#d94f4f" onclick="startQuiz()">Start Quiz ✨</button>
</div>

<!-- Quiz -->
<div id="quiz" class="hidden">
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
    <div class="progress-text" id="progressText">1/1</div>
  </div>
  <div class="emoji" id="emoji"></div>
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<!-- Loading -->
<div id="loading" class="hidden">
  <h2>Analyzing preferences ⏳</h2>
</div>

<!-- Result -->
<div id="result" class="hidden">
  <h2>Your Perfect Drink</h2>
  <div class="result" id="best"></div>
  <div id="probs"></div>
  <button style="background:#d94f4f" onclick="location.reload()">Try Again 🔄</button>
</div>

</div>

<script>
let questions = [];
let modelData = {};
let answers = [];
let qIndex = 0;

// 🍹 ONLY 3 drinks now
const drinkImages = {
  "Matcha Cloud Coconut": "image1.png",
  "Vin Chaud": "image2.png",
  "Matcha Strawberry Latte": "image3.png"
};

async function loadData() {
  try {
    const qRes = await fetch("./questions.json");
    const mRes = await fetch("./model_probs.json");

    if (!qRes.ok || !mRes.ok) {
      throw new Error("File not found");
    }

    questions = await qRes.json();
    modelData = await mRes.json();

  } catch (e) {
    alert("⚠️ Failed to load data files");
    console.error(e);
  }
}

async function startQuiz() {
  await loadData();
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  const q = questions[qIndex];
  document.getElementById("emoji").innerText = q.emoji;
  document.getElementById("question").innerText = q.text;

  const ansDiv = document.getElementById("answers");
  ansDiv.innerHTML = "";

  q.answers.forEach((a,i)=>{
    const b = document.createElement("button");
    b.className = "btn"+(i+1);
    b.innerText = a;
    b.onclick = ()=>answer(i);
    ansDiv.appendChild(b);
  });

  document.getElementById("progress").style.width = ((qIndex+1)/questions.length*100)+"%";
  document.getElementById("progressText").innerText = `${qIndex+1}/${questions.length}`;
}

function answer(i){
  answers.push(i);
  qIndex++;
  qIndex < questions.length ? showQuestion() : finish();
}

function finish(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");
  setTimeout(showResult,1200);
}

function showResult(){
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const key = answers.join("-");
  const probs = modelData[key] || {};
  

  let best = null;

  if (Object.keys(probs).length > 0) {
    best = Object.keys(probs).reduce((a,b)=>probs[a]>probs[b]?a:b);
  } else {
    best = "No result";
  }

  const bestImage = drinkImages[best] || "";
  document.getElementById("best").innerHTML =
    `${bestImage ? `<img src="${bestImage}" class="drink-large"><br>` : ""}${best}`;

  const pDiv = document.getElementById("probs");
  pDiv.innerHTML="";

  Object.keys(probs).forEach(name=>{
    const img = drinkImages[name] || "";
    const box = document.createElement("div");
    box.className="box";
    box.innerHTML = `
      <strong>${img ? `<img src="${img}" class="drink-small">` : ""} ${name}</strong>
      <div class="bar-row">
        <div class="bar">
          <div class="fill" style="width:${(probs[name]*100).toFixed(1)}%;background:#d94f4f"></div>
        </div>
        <div class="percent">${(probs[name]*100).toFixed(1)}%</div>
      </div>`;
    pDiv.appendChild(box);
  });
}
</script>
</body>
</html>
