<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎄 Data Picks Your Drink 🍹</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background: linear-gradient(to bottom, #ffecd2, #fcb69f);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 600px;
  width: 100%;
  background: #fff;
  border-radius: 20px;
  padding: 2rem;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
}

.hidden { display: none; }

button {
  width: 100%;
  padding: 1rem;
  margin: .5rem 0;
  font-size: 1.1rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  color: #fff;
}

.btn1{background:#ff6f61;}
.btn2{background:#ffb347;}
.btn3{background:#6a5acd;}
.btn4{background:#20b2aa;}

.progress-bar {
  height: 25px;
  background: #eee;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1rem;
  position: relative;
}

.progress {
  height: 100%;
  background: #d94f4f;
  width: 0%;
}

.progress-text {
  position: absolute;
  top: -30px;
  width: 100%;
  font-weight: bold;
}

.emoji { font-size: 5rem; }
.result { font-size: 2rem; color:#d94f4f; font-weight:bold; }

.box {
  background:#fafafa;
  border-radius:12px;
  padding:10px;
  margin:10px 0;
}

.bar-row {
  display:flex;
  align-items:center;
}

.bar {
  flex:1;
  height:22px;
  background:#eee;
  border-radius:12px;
  overflow:hidden;
  margin:0 10px;
}

.fill { height:100%; }
.percent { width:55px; text-align:right; font-weight:bold; }

img.drink-small { width:50px; border-radius:8px; margin-right:5px; vertical-align:middle; }
img.drink-large { width:150px; border-radius:12px; margin-bottom:10px; }

/* mobile */
@media (max-width: 600px) {
  .container { padding: 1.2rem; }
  .emoji { font-size: 3.5rem; }
  img.drink-large { width: 120px; }
}
</style>
</head>

<body>
<div class="container">

<div id="welcome">
  <h1>🎄 Data Picks Your Drink 🍹</h1>
  <button style="background:#d94f4f" onclick="startQuiz()">Start Quiz ✨</button>
</div>

<div id="quiz" class="hidden">
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
    <div class="progress-text" id="progressText">0/0</div>
  </div>

  <div class="emoji" id="emoji"></div>
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<div id="loading" class="hidden">
  <h2>Analyzing preferences ⏳</h2>
</div>

<div id="result" class="hidden">
  <h2>Your Perfect Drink</h2>
  <div class="result" id="best"></div>
  <div id="probs"></div>
  <button style="background:#d94f4f" onclick="location.reload()">Try Again 🔄</button>
</div>

</div>

<script>
let questions = [];
let modelData = {};
let answers = [];
let qIndex = 0;

// 3 drinks only
const drinkImages = {
  "Matcha Cloud Coconut": "image1.png",
  "Vin Chaud": "image2.png",
  "Matcha Strawberry Latte": "image3.png"
};

// ---------- LOAD DATA ----------
async function loadData() {
  try {
    const [qRes, mRes] = await Promise.all([
      fetch("./questions.json"),
      fetch("./model_probs.json")
    ]);

    if (!qRes.ok || !mRes.ok) {
      throw new Error("JSON files not found");
    }

    questions = await qRes.json();
    modelData = await mRes.json();

    console.log("Loaded:", questions, modelData);

  } catch (err) {
    console.error(err);
    alert("⚠️ Failed to load JSON files");
  }
}

// ---------- START ----------
async function startQuiz() {
  await loadData();

  if (!questions.length) {
    alert("No questions loaded");
    return;
  }

  answers = [];
  qIndex = 0;

  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  showQuestion();
}

// ---------- QUESTION ----------
function showQuestion() {
  const q = questions[qIndex];

  if (!q) return;

  const options = q.answers || q.options || [];

  document.getElementById("emoji").innerText = q.emoji || "";
  document.getElementById("question").innerText = q.text || "";

  const ansDiv = document.getElementById("answers");
  ansDiv.innerHTML = "";

  options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "btn" + (i + 1);
    btn.innerText = opt;
    btn.onclick = () => answer(i);
    ansDiv.appendChild(btn);
  });

  document.getElementById("progress").style.width =
    ((qIndex + 1) / questions.length) * 100 + "%";

  document.getElementById("progressText").innerText =
    `${qIndex + 1}/${questions.length}`;
}

// ---------- ANSWER ----------
function answer(i) {
  answers.push(i);
  qIndex++;

  if (qIndex < questions.length) {
    showQuestion();
  } else {
    finish();
  }
}

// ---------- FINISH ----------
function finish() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  setTimeout(showResult, 800);
}

// ---------- RESULT ----------
function showResult() {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const key = answers.join("-");
  const probs = modelData[key];

  if (!probs) {
    document.getElementById("best").innerText = "No result found";
    return;
  }

  const best = Object.keys(probs).reduce((a, b) =>
    probs[a] > probs[b] ? a : b
  );

  document.getElementById("best").innerHTML =
    `<img src="${drinkImages[best] || ""}" class="drink-large"><br>${best}`;

  const pDiv = document.getElementById("probs");
  pDiv.innerHTML = "";

  Object.entries(probs).forEach(([name, val]) => {
    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <strong>
        ${drinkImages[name] ? `<img src="${drinkImages[name]}" class="drink-small">` : ""}
        ${name}
      </strong>
      <div class="bar-row">
        <div class="bar">
          <div class="fill" style="width:${(val * 100).toFixed(1)}%"></div>
        </div>
        <div class="percent">${(val * 100).toFixed(1)}%</div>
      </div>
    `;

    pDiv.appendChild(box);
  });
}
</script>

</body>
</html>
